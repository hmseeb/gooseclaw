<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>gooseclaw // admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #08080a;
  --surface: #111114;
  --surface-2: #1a1a1f;
  --border: #252528;
  --border-hover: #3a3a40;
  --text: #d4d4d8;
  --text-muted: #71717a;
  --text-dim: #52525b;
  --accent: #f59e0b;
  --accent-dim: rgba(245, 158, 11, 0.15);
  --accent-glow: rgba(245, 158, 11, 0.4);
  --green: #22c55e;
  --green-dim: rgba(34, 197, 94, 0.15);
  --red: #ef4444;
  --red-dim: rgba(239, 68, 68, 0.15);
  --blue: #3b82f6;
  --blue-dim: rgba(59, 130, 246, 0.15);
  --font-display: 'Major Mono Display', monospace;
  --font-mono: 'DM Mono', 'Courier New', monospace;
  --radius: 2px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

/* subtle grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(245, 158, 11, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245, 158, 11, 0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* noise overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.02;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 960px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}

/* ── header ── */
.header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 48px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}

.header h1 {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 400;
  letter-spacing: 2px;
  color: var(--accent);
}

.header-meta {
  display: flex;
  align-items: center;
  gap: 16px;
  color: var(--text-muted);
  font-size: 11px;
}

.version-badge {
  padding: 2px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-dim);
  font-size: 11px;
}

.refresh-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
  display: inline-block;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ── status bar ── */
.status-bar {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 40px;
}

.status-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  transition: border-color 0.2s;
}

.status-card:hover {
  border-color: var(--border-hover);
}

.status-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.status-value {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
}

.dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

.dot.green { background: var(--green); box-shadow: 0 0 8px var(--green); }
.dot.red { background: var(--red); box-shadow: 0 0 8px var(--red); }
.dot.amber { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
.dot.dim { background: var(--text-dim); }

/* ── sections ── */
.section {
  margin-bottom: 40px;
}

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.section-title {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 400;
  letter-spacing: 1px;
  color: var(--text);
}

.section-count {
  font-size: 11px;
  color: var(--text-dim);
  padding: 2px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
}

/* ── table ── */
.table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  text-align: left;
  padding: 10px 14px;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  font-weight: 400;
}

td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  vertical-align: middle;
}

tr:last-child td { border-bottom: none; }

tr:hover td { background: rgba(255,255,255,0.02); }

.type-badge {
  display: inline-block;
  padding: 1px 6px;
  border-radius: var(--radius);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.type-badge.reminder {
  background: var(--accent-dim);
  color: var(--accent);
  border: 1px solid rgba(245, 158, 11, 0.3);
}

.type-badge.script {
  background: var(--blue-dim);
  color: var(--blue);
  border: 1px solid rgba(59, 130, 246, 0.3);
}

.status-badge {
  display: inline-block;
  padding: 1px 6px;
  border-radius: var(--radius);
  font-size: 10px;
}

.status-badge.ok {
  background: var(--green-dim);
  color: var(--green);
}

.status-badge.error {
  background: var(--red-dim);
  color: var(--red);
}

.status-badge.pending {
  color: var(--text-dim);
}

.action-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 3px 8px;
  border-radius: var(--radius);
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 10px;
  transition: all 0.15s;
}

.action-btn:hover {
  border-color: var(--text-muted);
  color: var(--text);
}

.action-btn.danger:hover {
  border-color: var(--red);
  color: var(--red);
}

.action-btn.trigger:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.actions { display: flex; gap: 6px; }

.empty-state {
  padding: 32px;
  text-align: center;
  color: var(--text-dim);
  font-size: 12px;
}

.name-cell {
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.schedule-cell {
  color: var(--text-muted);
  font-size: 11px;
}

/* ── create job panel ── */
.create-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-top: 12px;
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.3s ease;
}

.create-panel.open {
  max-height: 600px;
}

.create-inner {
  padding: 20px;
}

.toggle-create {
  background: none;
  border: 1px solid var(--border);
  color: var(--accent);
  padding: 4px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 11px;
  transition: all 0.15s;
}

.toggle-create:hover {
  border-color: var(--accent);
  background: var(--accent-dim);
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}

.form-row.full {
  grid-template-columns: 1fr;
}

.form-group label {
  display: block;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 4px;
}

.form-group input,
.form-group select {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 8px 10px;
  outline: none;
  transition: border-color 0.15s;
}

.form-group input:focus,
.form-group select:focus {
  border-color: var(--accent);
}

.form-group input::placeholder {
  color: var(--text-dim);
}

.type-tabs {
  display: flex;
  gap: 0;
  margin-bottom: 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.type-tab {
  flex: 1;
  padding: 8px;
  text-align: center;
  background: var(--bg);
  border: none;
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 11px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: all 0.15s;
}

.type-tab.active {
  background: var(--accent-dim);
  color: var(--accent);
}

.type-tab:not(:last-child) {
  border-right: 1px solid var(--border);
}

.submit-btn {
  background: var(--accent-dim);
  border: 1px solid rgba(245, 158, 11, 0.3);
  color: var(--accent);
  padding: 8px 20px;
  border-radius: var(--radius);
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: all 0.15s;
  margin-top: 4px;
}

.submit-btn:hover {
  background: rgba(245, 158, 11, 0.25);
  border-color: var(--accent);
}

.submit-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

/* ── toast ── */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  padding: 10px 16px;
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-size: 12px;
  z-index: 100;
  transform: translateY(80px);
  opacity: 0;
  transition: all 0.3s ease;
}

.toast.show {
  transform: translateY(0);
  opacity: 1;
}

.toast.success {
  background: var(--green-dim);
  border: 1px solid rgba(34, 197, 94, 0.3);
  color: var(--green);
}

.toast.error {
  background: var(--red-dim);
  border: 1px solid rgba(239, 68, 68, 0.3);
  color: var(--red);
}

/* ── channels ── */
.channel-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
}

.channel-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}

.channel-name {
  font-size: 14px;
  margin-bottom: 8px;
  color: var(--text);
}

.channel-meta {
  font-size: 11px;
  color: var(--text-dim);
}

.channel-meta span {
  display: inline-block;
  margin-right: 12px;
}

/* ── telegram ── */
.tg-info {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.tg-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}

.tg-card h4 {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  margin-bottom: 10px;
  font-weight: 400;
}

.tg-user {
  font-size: 12px;
  padding: 4px 0;
  color: var(--text-muted);
}

.pair-code {
  font-size: 18px;
  font-weight: 500;
  color: var(--accent);
  letter-spacing: 2px;
}

.pair-btn {
  margin-top: 10px;
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 6px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 11px;
  transition: all 0.15s;
}

.pair-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* ── responsive ── */
@media (max-width: 640px) {
  .header { flex-direction: column; gap: 12px; }
  .form-row { grid-template-columns: 1fr; }
  .tg-info { grid-template-columns: 1fr; }
  .status-bar { grid-template-columns: 1fr 1fr; }
  td, th { padding: 8px 10px; }
}
</style>
</head>
<body>

<div class="container">
  <!-- header -->
  <div class="header">
    <h1>gooseclaw</h1>
    <div class="header-meta">
      <span class="version-badge" id="version">v-.-.-</span>
      <span><span class="refresh-dot"></span> live</span>
    </div>
  </div>

  <!-- status bar -->
  <div class="status-bar" id="status-bar">
    <div class="status-card">
      <div class="status-label">gateway</div>
      <div class="status-value"><span class="dot dim" id="dot-health"></span><span id="val-health">...</span></div>
    </div>
    <div class="status-card">
      <div class="status-label">goose web</div>
      <div class="status-value"><span class="dot dim" id="dot-goose"></span><span id="val-goose">...</span></div>
    </div>
    <div class="status-card">
      <div class="status-label">telegram</div>
      <div class="status-value"><span class="dot dim" id="dot-tg"></span><span id="val-tg">...</span></div>
    </div>
    <div class="status-card">
      <div class="status-label">notify</div>
      <div class="status-value"><span class="dot dim" id="dot-notify"></span><span id="val-notify">...</span></div>
    </div>
  </div>

  <!-- jobs -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">jobs</span>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="section-count" id="job-count">0</span>
        <button class="toggle-create" onclick="toggleCreate()">+ new</button>
      </div>
    </div>

    <div class="create-panel" id="create-panel">
      <div class="create-inner">
        <div class="type-tabs">
          <button class="type-tab active" onclick="setJobType('script')" id="tab-script">script</button>
          <button class="type-tab" onclick="setJobType('reminder')" id="tab-reminder">reminder</button>
        </div>
        <div class="form-row" id="script-fields">
          <div class="form-group">
            <label>name</label>
            <input type="text" id="job-name" placeholder="cost-check">
          </div>
          <div class="form-group">
            <label>command</label>
            <input type="text" id="job-command" placeholder="curl -s api/costs | notify">
          </div>
        </div>
        <div class="form-row" id="reminder-fields" style="display:none">
          <div class="form-group" style="grid-column:1/-1">
            <label>message</label>
            <input type="text" id="job-text" placeholder="drink water">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>schedule type</label>
            <select id="sched-type" onchange="updateSchedFields()">
              <option value="cron">cron expression</option>
              <option value="every">every interval</option>
              <option value="in">in (delay)</option>
              <option value="at">at (time)</option>
            </select>
          </div>
          <div class="form-group">
            <label id="sched-label">cron expression</label>
            <input type="text" id="sched-value" placeholder="0 */6 * * *">
          </div>
        </div>
        <button class="submit-btn" onclick="createJob()" id="submit-btn">create job</button>
      </div>
    </div>

    <div class="table-wrap" id="jobs-table">
      <div class="empty-state">loading...</div>
    </div>
  </div>

  <!-- channels -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">channels</span>
      <span class="section-count" id="channel-count">0</span>
    </div>
    <div id="channels-content">
      <div class="table-wrap"><div class="empty-state">loading...</div></div>
    </div>
  </div>

  <!-- telegram -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">telegram</span>
    </div>
    <div class="tg-info" id="tg-content">
      <div class="tg-card">
        <h4>paired users</h4>
        <div id="tg-users"><span class="tg-user">loading...</span></div>
      </div>
      <div class="tg-card">
        <h4>pairing</h4>
        <div id="tg-pair">
          <button class="pair-btn" onclick="generatePairCode()">generate code</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';

// ── state ──
let currentJobType = 'script';

// ── fetch helpers ──
async function api(path, opts = {}) {
  try {
    const res = await fetch(API + path, opts);
    return await res.json();
  } catch (e) {
    return { error: e.message };
  }
}

function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type;
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ── status ──
async function refreshStatus() {
  const [health, version, goose, tg, notify] = await Promise.all([
    api('/api/health'),
    api('/api/version'),
    api('/api/setup/status'),
    api('/api/telegram/status'),
    api('/api/notify/status'),
  ]);

  // version
  if (version.version) {
    document.getElementById('version').textContent = 'v' + version.version;
  }

  // health
  const hOk = health.status === 'ok';
  setDot('dot-health', hOk ? 'green' : 'red');
  document.getElementById('val-health').textContent = hOk ? 'healthy' : 'down';

  // goose web
  const gState = goose.state || 'unknown';
  const gOk = gState === 'ready';
  setDot('dot-goose', gOk ? 'green' : gState === 'starting' ? 'amber' : 'red');
  document.getElementById('val-goose').textContent = gState;

  // telegram
  const tgOk = tg.running === true;
  setDot('dot-tg', tgOk ? 'green' : 'dim');
  const pairedCount = tg.paired_users || 0;
  const pairedIds = tg.paired_chat_ids || [];
  document.getElementById('val-tg').textContent = tgOk ? pairedCount + ' paired' : 'offline';

  // notify
  const nOk = notify.available === true;
  setDot('dot-notify', nOk ? 'green' : 'dim');
  document.getElementById('val-notify').textContent = nOk ? 'ready' : 'no channels';

  // telegram detail
  const usersEl = document.getElementById('tg-users');
  if (pairedIds.length > 0) {
    usersEl.innerHTML = pairedIds.map(id => {
      return '<div class="tg-user">chat <span style="color:var(--text-dim)">#' + escHtml(String(id)) + '</span></div>';
    }).join('');
  } else {
    usersEl.innerHTML = '<span class="tg-user" style="color:var(--text-dim)">no users paired</span>';
  }
}

function setDot(id, color) {
  const el = document.getElementById(id);
  el.className = 'dot ' + color;
}

// ── jobs ──
async function refreshJobs() {
  const data = await api('/api/jobs');
  const jobs = data.jobs || [];
  document.getElementById('job-count').textContent = jobs.length;

  const wrap = document.getElementById('jobs-table');
  if (jobs.length === 0) {
    wrap.innerHTML = '<div class="empty-state">no active jobs</div>';
    return;
  }

  let html = '<table><tr><th>type</th><th>name</th><th>schedule</th><th>status</th><th>actions</th></tr>';
  for (const j of jobs) {
    const typeCls = j.type === 'reminder' ? 'reminder' : 'script';
    const statusCls = j.last_status === 'ok' ? 'ok' : j.last_status === 'error' || j.last_status === 'timeout' ? 'error' : 'pending';
    const statusText = j.last_status || '-';

    let sched = '';
    if (j.cron) sched = j.cron;
    else if (j.fires_at_human) sched = j.fires_at_human;
    if (j.recurring_seconds) sched += ' (every ' + formatDuration(j.recurring_seconds) + ')';

    html += '<tr>'
      + '<td><span class="type-badge ' + typeCls + '">' + j.type + '</span></td>'
      + '<td class="name-cell" title="' + escAttr(j.name) + '">' + escHtml(j.name) + '</td>'
      + '<td class="schedule-cell">' + escHtml(sched || '-') + '</td>'
      + '<td><span class="status-badge ' + statusCls + '">' + statusText + '</span></td>'
      + '<td class="actions">'
      + '<button class="action-btn trigger" onclick="triggerJob(\'' + j.id + '\')" title="run now">run</button>'
      + '<button class="action-btn danger" onclick="deleteJob(\'' + j.id + '\')" title="delete">del</button>'
      + '</td></tr>';
  }
  html += '</table>';
  wrap.innerHTML = html;
}

async function deleteJob(id) {
  const data = await api('/api/jobs/' + id, { method: 'DELETE' });
  if (data.deleted) {
    toast('job deleted');
    refreshJobs();
  } else {
    toast(data.error || 'failed', 'error');
  }
}

async function triggerJob(id) {
  const data = await api('/api/jobs/' + id + '/run', { method: 'POST' });
  if (data.started) {
    toast('job triggered');
    setTimeout(refreshJobs, 2000);
  } else {
    toast(data.error || 'failed', 'error');
  }
}

// ── create job ──
function toggleCreate() {
  document.getElementById('create-panel').classList.toggle('open');
}

function setJobType(type) {
  currentJobType = type;
  document.getElementById('tab-script').className = 'type-tab' + (type === 'script' ? ' active' : '');
  document.getElementById('tab-reminder').className = 'type-tab' + (type === 'reminder' ? ' active' : '');
  document.getElementById('script-fields').style.display = type === 'script' ? '' : 'none';
  document.getElementById('reminder-fields').style.display = type === 'reminder' ? '' : 'none';
}

function updateSchedFields() {
  const type = document.getElementById('sched-type').value;
  const label = document.getElementById('sched-label');
  const input = document.getElementById('sched-value');
  const map = {
    cron: ['cron expression', '0 */6 * * *'],
    every: ['interval', '1h'],
    in: ['delay', '5m'],
    at: ['time (HH:MM)', '09:00'],
  };
  label.textContent = map[type][0];
  input.placeholder = map[type][1];
  input.value = '';
}

async function createJob() {
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;

  const schedType = document.getElementById('sched-type').value;
  const schedVal = document.getElementById('sched-value').value.trim();

  if (!schedVal) {
    toast('schedule value required', 'error');
    btn.disabled = false;
    return;
  }

  const body = { type: currentJobType };

  if (currentJobType === 'script') {
    body.name = document.getElementById('job-name').value.trim();
    body.command = document.getElementById('job-command').value.trim();
    if (!body.command) { toast('command required', 'error'); btn.disabled = false; return; }
    if (!body.name) body.name = body.command.substring(0, 40);
  } else {
    body.text = document.getElementById('job-text').value.trim();
    if (!body.text) { toast('message required', 'error'); btn.disabled = false; return; }
  }

  if (schedType === 'cron') {
    body.cron = schedVal;
  } else if (schedType === 'every') {
    body.recurring_seconds = parseDuration(schedVal);
    if (!body.recurring_seconds) { toast('invalid interval', 'error'); btn.disabled = false; return; }
  } else if (schedType === 'in') {
    body.delay_seconds = parseDuration(schedVal);
    if (!body.delay_seconds) { toast('invalid duration', 'error'); btn.disabled = false; return; }
  } else if (schedType === 'at') {
    const [h, m] = schedVal.split(':').map(Number);
    if (isNaN(h) || isNaN(m)) { toast('use HH:MM format', 'error'); btn.disabled = false; return; }
    const now = new Date();
    const target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0);
    if (target <= now) target.setDate(target.getDate() + 1);
    body.fire_at = target.getTime() / 1000;
  }

  const data = await api('/api/jobs', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });

  btn.disabled = false;

  if (data.created) {
    toast('job created');
    document.getElementById('create-panel').classList.remove('open');
    // clear form
    document.getElementById('job-name').value = '';
    document.getElementById('job-command').value = '';
    document.getElementById('job-text').value = '';
    document.getElementById('sched-value').value = '';
    refreshJobs();
  } else {
    toast(data.error || 'failed to create', 'error');
  }
}

// ── channels ──
async function refreshChannels() {
  const data = await api('/api/channels');
  const channels = data.channels || [];
  document.getElementById('channel-count').textContent = channels.length;

  const el = document.getElementById('channels-content');
  if (channels.length === 0) {
    el.innerHTML = '<div class="table-wrap"><div class="empty-state">no channel plugins loaded</div></div>';
    return;
  }

  el.innerHTML = '<div class="channel-grid">' + channels.map(c => {
    return '<div class="channel-card">'
      + '<div class="channel-name">' + escHtml(c.name) + '</div>'
      + '<div class="channel-meta">'
      + '<span>v' + c.version + '</span>'
      + '<span>' + (c.has_poll ? 'bidirectional' : 'outbound only') + '</span>'
      + '</div></div>';
  }).join('') + '</div>';
}

// ── telegram pairing ──
async function generatePairCode() {
  const data = await api('/api/telegram/pair', { method: 'POST' });
  if (data.code) {
    document.getElementById('tg-pair').innerHTML =
      '<div class="pair-code">' + escHtml(data.code) + '</div>'
      + '<div style="margin-top:6px;color:var(--text-dim);font-size:11px">send this to the bot</div>'
      + '<button class="pair-btn" onclick="generatePairCode()" style="margin-top:8px">regenerate</button>';
  } else {
    toast(data.error || 'failed', 'error');
  }
}

// ── helpers ──
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escAttr(s) { return s.replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

function parseDuration(s) {
  let total = 0;
  const h = s.match(/(\d+)h/); if (h) total += parseInt(h[1]) * 3600;
  const m = s.match(/(\d+)m/); if (m) total += parseInt(m[1]) * 60;
  const sec = s.match(/(\d+)s/); if (sec) total += parseInt(sec[1]);
  if (total === 0 && /^\d+$/.test(s)) total = parseInt(s);
  return total || null;
}

function formatDuration(s) {
  if (s >= 3600) return Math.floor(s / 3600) + 'h' + (s % 3600 >= 60 ? Math.floor((s % 3600) / 60) + 'm' : '');
  if (s >= 60) return Math.floor(s / 60) + 'm';
  return s + 's';
}

// ── init ──
async function refresh() {
  await Promise.all([refreshStatus(), refreshJobs(), refreshChannels()]);
}

refresh();
setInterval(refresh, 30000);
</script>
