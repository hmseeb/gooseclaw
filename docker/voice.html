<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Voice - GooseClaw</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --brand: #7c6aef;
      --brand-dim: rgba(124, 106, 239, 0.3);
      --bg: #0a0a0c;
      --bg-elevated: #141418;
      --bg-surface: #1a1a20;
      --bg-card: rgba(255, 255, 255, 0.04);
      --text-primary: #eaeaef;
      --text-secondary: rgba(255, 255, 255, 0.55);
      --text-dim: rgba(255, 255, 255, 0.3);
      --border: rgba(255, 255, 255, 0.06);
      --red: #ef4444;
      --amber: #f59e0b;
      --green: #22c55e;
      --blue: #3b82f6;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Header ─────────────────────────────────────────────────────── */

    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    #header h1 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--text-primary);
    }

    .header-actions {
      position: relative;
    }

    #settings-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: none;
      background: var(--bg-card);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    #settings-btn:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    #settings-btn svg {
      width: 20px;
      height: 20px;
      fill: var(--text-secondary);
      transition: transform 0.3s ease, fill 0.2s;
    }

    #settings-btn:hover svg,
    #settings-btn.open svg {
      fill: var(--text-primary);
    }

    #settings-btn.open svg {
      transform: rotate(60deg);
    }

    /* Settings dropdown */
    #settings-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      min-width: 180px;
      opacity: 0;
      transform: translateY(-8px) scale(0.95);
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 50;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
    }

    #settings-dropdown.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: all;
    }

    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 18px;
      background: none;
      border: none;
      width: 100%;
      color: var(--text-primary);
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s;
      text-align: left;
    }

    .dropdown-item:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .dropdown-item svg {
      width: 18px;
      height: 18px;
      fill: var(--text-secondary);
      flex-shrink: 0;
    }

    .dropdown-item.danger {
      color: var(--red);
    }

    .dropdown-item.danger svg {
      fill: var(--red);
    }

    .dropdown-divider {
      height: 1px;
      background: var(--border);
    }

    /* ── Error banner ───────────────────────────────────────────────── */

    #error-banner {
      display: none;
      background: rgba(127, 29, 29, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #fecaca;
      padding: 12px 20px;
      font-size: 13px;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      animation: slideDown 0.3s ease;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
    }

    #error-banner.visible {
      display: flex;
    }

    #error-banner .error-text {
      flex: 1;
      margin-right: 12px;
    }

    #error-banner .error-close {
      background: none;
      border: none;
      color: #fecaca;
      font-size: 20px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-100%); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Orb Hero Area ──────────────────────────────────────────────── */

    #orb-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 0 16px;
      flex-shrink: 0;
      position: relative;
    }

    .orb-wrapper {
      position: relative;
      width: 200px;
      height: 200px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    #visualizer-canvas {
      width: 200px;
      height: 200px;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }

    /* Glassmorphism orb overlay */
    .orb-glass {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      z-index: 2;
      pointer-events: none;
      transition: border-color 0.6s ease, box-shadow 0.6s ease;
    }

    /* State-based orb glass effects */
    body[data-state="disconnected"] .orb-glass {
      border-color: rgba(255, 255, 255, 0.04);
      box-shadow: 0 0 40px rgba(80, 80, 80, 0.1);
    }

    body[data-state="connecting"] .orb-glass {
      border-color: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 50px rgba(200, 200, 200, 0.1);
      animation: connectPulse 2s ease-in-out infinite;
    }

    body[data-state="ready"] .orb-glass {
      border-color: rgba(124, 106, 239, 0.2);
      box-shadow: 0 0 60px rgba(124, 106, 239, 0.15);
    }

    body[data-state="listening"] .orb-glass {
      border-color: rgba(239, 68, 68, 0.25);
      box-shadow: 0 0 60px rgba(239, 68, 68, 0.2);
    }

    body[data-state="thinking"] .orb-glass {
      border-color: rgba(245, 158, 11, 0.2);
      box-shadow: 0 0 60px rgba(245, 158, 11, 0.15);
    }

    body[data-state="speaking"] .orb-glass {
      border-color: rgba(34, 197, 94, 0.25);
      box-shadow: 0 0 60px rgba(34, 197, 94, 0.2);
    }

    @keyframes connectPulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.04); }
    }

    /* Thinking ring animation */
    .orb-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 2px solid transparent;
      z-index: 3;
      pointer-events: none;
      transition: border-color 0.4s ease;
    }

    body[data-state="thinking"] .orb-ring {
      border-color: transparent;
      border-top-color: rgba(245, 158, 11, 0.6);
      border-right-color: rgba(245, 158, 11, 0.3);
      animation: orbSpin 1.2s linear infinite;
    }

    @keyframes orbSpin {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Mic icon inside orb */
    .orb-mic-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 4;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .orb-mic-icon svg {
      width: 32px;
      height: 32px;
      fill: rgba(255, 255, 255, 0.7);
      transition: fill 0.3s ease;
    }

    body[data-state="listening"] .orb-mic-icon svg {
      fill: rgba(255, 255, 255, 0.9);
    }

    body[data-state="speaking"] .orb-mic-icon svg {
      fill: rgba(255, 255, 255, 0.5);
    }

    /* Status text below orb */
    #status-text {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.3px;
      margin-top: 16px;
      text-align: center;
      transition: color 0.4s ease;
    }

    body[data-state="disconnected"] #status-text { color: var(--text-dim); }
    body[data-state="connecting"] #status-text { color: var(--text-secondary); }
    body[data-state="ready"] #status-text { color: var(--brand); }
    body[data-state="listening"] #status-text { color: var(--red); }
    body[data-state="thinking"] #status-text { color: var(--amber); }
    body[data-state="speaking"] #status-text { color: var(--green); }

    .keyboard-hint {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 6px;
      transition: opacity 0.3s;
    }

    @media (pointer: coarse) {
      .keyboard-hint { display: none; }
    }

    /* ── Transcript Area ────────────────────────────────────────────── */

    #transcript {
      flex: 1;
      overflow-y: auto;
      padding: 8px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      mask-image: linear-gradient(to bottom, transparent 0%, black 16px, black 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 16px, black 100%);
    }

    /* Transcript messages */
    .transcript-msg {
      max-width: 82%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.55;
      word-wrap: break-word;
      animation: msgIn 0.25s ease-out;
    }

    .transcript-msg.user {
      align-self: flex-end;
      background: var(--brand);
      color: #fff;
      border-bottom-right-radius: 6px;
    }

    .transcript-msg.ai {
      align-self: flex-start;
      background: var(--bg-surface);
      color: var(--text-primary);
      border-bottom-left-radius: 6px;
    }

    .transcript-msg .speaker-label {
      font-size: 10px;
      font-weight: 600;
      opacity: 0.5;
      margin-bottom: 2px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Tool Status Cards ──────────────────────────────────────────── */

    .tool-status {
      align-self: center;
      max-width: 88%;
      width: 100%;
      background: var(--bg-card);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      padding: 10px 14px;
      margin: 4px 0;
      border-radius: 12px;
      font-size: 13px;
      animation: msgIn 0.25s ease-out;
    }

    .tool-badge {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tool-name {
      font-weight: 600;
      color: var(--blue);
      font-size: 12px;
    }

    .tool-state {
      color: var(--text-dim);
      font-size: 12px;
    }

    .tool-state.running::after {
      content: '';
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 1.5px solid var(--blue);
      border-top-color: transparent;
      border-radius: 50%;
      animation: tool-spin 0.8s linear infinite;
      margin-left: 6px;
      vertical-align: middle;
    }

    @keyframes tool-spin {
      to { transform: rotate(360deg); }
    }

    .tool-result {
      margin-top: 6px;
      color: var(--text-secondary);
      font-size: 12px;
      max-height: 60px;
      overflow: hidden;
      text-overflow: ellipsis;
      word-break: break-word;
      line-height: 1.4;
    }

    .tool-status.error {
      border-color: rgba(239, 68, 68, 0.2);
      background: rgba(239, 68, 68, 0.06);
    }

    .tool-status.error .tool-name {
      color: var(--red);
    }

    .tool-status.cancelled {
      border-color: rgba(245, 158, 11, 0.15);
      background: rgba(245, 158, 11, 0.04);
      opacity: 0.7;
    }

    /* ── Text Input Bar ─────────────────────────────────────────────── */

    #text-input-bar {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      padding-bottom: calc(10px + var(--safe-bottom));
      gap: 10px;
      flex-shrink: 0;
      background: var(--bg);
      border-top: 1px solid var(--border);
      transform: translateY(0);
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    body[data-state="disconnected"] #text-input-bar,
    body[data-state="connecting"] #text-input-bar {
      transform: translateY(100%);
      opacity: 0;
      pointer-events: none;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
    }

    #text-input-bar input {
      flex: 1;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 12px 18px;
      border-radius: 24px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    #text-input-bar input::placeholder {
      color: var(--text-dim);
    }

    #text-input-bar input:focus {
      border-color: var(--brand);
    }

    #text-input-bar button {
      width: 44px;
      height: 44px;
      min-width: 44px;
      border-radius: 50%;
      background: var(--brand);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s, transform 0.15s;
    }

    #text-input-bar button:active {
      transform: scale(0.92);
    }

    #text-input-bar input:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #text-input-bar button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ── Bottom Sheet (History + Voice Picker) ──────────────────────── */

    .bottom-sheet-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 90;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .bottom-sheet-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .bottom-sheet {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      max-height: 75vh;
      background: var(--bg-elevated);
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
      z-index: 100;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    }

    .bottom-sheet.active {
      transform: translateY(0);
    }

    .sheet-handle {
      width: 36px;
      height: 4px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
      margin: 10px auto 0;
      flex-shrink: 0;
    }

    .sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 10px;
      flex-shrink: 0;
    }

    .sheet-header h2 {
      font-size: 17px;
      font-weight: 700;
    }

    .sheet-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--bg-card);
      border: none;
      color: var(--text-secondary);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .sheet-close:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .sheet-body {
      overflow-y: auto;
      padding: 4px 20px 20px;
      padding-bottom: calc(20px + var(--safe-bottom));
      -webkit-overflow-scrolling: touch;
      flex: 1;
    }

    /* ── History Panel ──────────────────────────────────────────────── */

    .history-item {
      padding: 14px 16px;
      margin-bottom: 8px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .history-item:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.1);
    }

    .history-date {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 4px;
      font-weight: 500;
    }

    .history-preview {
      font-size: 14px;
      color: var(--text-primary);
      line-height: 1.4;
    }

    .history-meta {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    .history-empty {
      text-align: center;
      color: var(--text-dim);
      padding: 40px 20px;
      font-size: 14px;
    }

    /* Session detail inside history */
    #session-detail { display: none; }
    #session-detail.active { display: block; }
    #history-list.hidden { display: none; }

    .session-detail-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .session-back {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--bg-card);
      border: none;
      color: var(--text-secondary);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #session-detail-title {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .session-transcript { max-width: 600px; margin: 0 auto; }

    .session-msg {
      padding: 8px 12px;
      margin-bottom: 6px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.45;
    }

    .session-msg.user {
      background: rgba(124, 106, 239, 0.15);
      margin-left: 2rem;
      border-bottom-right-radius: 4px;
    }

    .session-msg.ai {
      background: var(--bg-card);
      margin-right: 2rem;
      border-bottom-left-radius: 4px;
    }

    .session-msg.tool {
      background: rgba(245, 158, 11, 0.06);
      font-size: 12px;
      color: var(--text-dim);
      text-align: center;
      border-radius: 8px;
    }

    .session-msg-speaker {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 2px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    /* ── Voice Picker ──────────────────────────────────────────────── */

    .voice-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px;
      max-width: 600px;
      margin: 0 auto;
    }

    .voice-option {
      padding: 14px 12px;
      background: var(--bg-card);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .voice-option:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.1);
    }

    .voice-option.selected {
      border-color: var(--brand);
      background: rgba(124, 106, 239, 0.1);
    }

    .voice-option-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .voice-option-style {
      font-size: 11px;
      color: var(--text-dim);
    }

    /* ── Mobile adjustments ──────────────────────────────────────── */

    @media (max-width: 768px) {
      .orb-wrapper {
        width: 220px;
        height: 220px;
      }

      #visualizer-canvas {
        width: 220px;
        height: 220px;
      }

      .orb-glass {
        width: 130px;
        height: 130px;
      }

      .orb-ring {
        width: 150px;
        height: 150px;
      }

      .orb-mic-icon svg {
        width: 36px;
        height: 36px;
      }

      .keyboard-hint {
        display: none;
      }
    }

    @media (max-width: 380px) {
      .orb-wrapper {
        width: 180px;
        height: 180px;
      }

      #visualizer-canvas {
        width: 180px;
        height: 180px;
      }

      .orb-glass {
        width: 110px;
        height: 110px;
      }

      .orb-ring {
        width: 126px;
        height: 126px;
      }
    }

    /* ── Utility ─────────────────────────────────────────────────── */

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.15); }
  </style>
</head>
<body data-state="disconnected">

  <!-- Error banner -->
  <div id="error-banner">
    <span class="error-text"></span>
    <button class="error-close" onclick="clearError()">&times;</button>
  </div>

  <!-- Header -->
  <div id="header">
    <h1>GooseClaw</h1>
    <div class="header-actions">
      <button id="settings-btn" onclick="toggleSettings()" aria-label="Settings">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
        </svg>
      </button>
      <div id="settings-dropdown">
        <button class="dropdown-item" onclick="toggleHistory(); closeSettings();">
          <svg viewBox="0 0 24 24"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
          History
        </button>
        <button class="dropdown-item" onclick="toggleVoicePicker(); closeSettings();">
          <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V21c0 .55.45 1 1 1s1-.45 1-1v-3.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/></svg>
          Voice
        </button>
        <div class="dropdown-divider"></div>
        <button class="dropdown-item danger" onclick="disconnectVoice(); closeSettings();">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8 0-1.85.63-3.55 1.69-4.9L16.9 18.31A7.902 7.902 0 0 1 12 20zm6.31-3.1L7.1 5.69A7.902 7.902 0 0 1 12 4c4.42 0 8 3.58 8 8 0 1.85-.63 3.55-1.69 4.9z"/></svg>
          Disconnect
        </button>
      </div>
    </div>
  </div>

  <!-- Orb Hero -->
  <div id="orb-area">
    <div class="orb-wrapper" onclick="onMicClick()" id="mic-btn" data-state="disconnected">
      <canvas id="visualizer-canvas"></canvas>
      <div class="orb-glass"></div>
      <div class="orb-ring"></div>
      <div class="orb-mic-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
      </div>
    </div>
    <div id="status-text">Tap to connect</div>
    <div class="keyboard-hint">Space: hold to talk &middot; Esc: disconnect</div>
  </div>

  <!-- Transcript -->
  <div id="transcript"></div>

  <!-- Text Input Bar -->
  <div id="text-input-bar">
    <input type="text" id="text-input" placeholder="Type a message..."
           autocomplete="off" enterkeyhint="send" disabled>
    <button id="text-send-btn" aria-label="Send message" disabled>
      <svg viewBox="0 0 24 24" width="20" height="20" fill="#fff">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>

  <!-- Bottom Sheet Overlay -->
  <div class="bottom-sheet-overlay" id="sheet-overlay" onclick="closeAllSheets()"></div>

  <!-- History Bottom Sheet -->
  <div class="bottom-sheet" id="history-panel">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2>Voice History</h2>
      <button class="sheet-close" onclick="toggleHistory()">&times;</button>
    </div>
    <div class="sheet-body">
      <div id="history-list"></div>
      <div id="session-detail">
        <div class="session-detail-header">
          <button class="session-back" onclick="backToHistory()">&larr;</button>
          <span id="session-detail-title"></span>
        </div>
        <div id="session-transcript" class="session-transcript"></div>
      </div>
    </div>
  </div>

  <!-- Voice Picker Bottom Sheet -->
  <div class="bottom-sheet" id="voice-picker">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2>Choose Voice</h2>
      <button class="sheet-close" onclick="toggleVoicePicker()">&times;</button>
    </div>
    <div class="sheet-body">
      <div id="voice-grid" class="voice-grid"></div>
    </div>
  </div>

  <script>
    'use strict';

    // ── State Machine ──────────────────────────────────────────────────────────

    const STATE = {
      DISCONNECTED: 'disconnected',
      CONNECTING: 'connecting',
      READY: 'ready',
      LISTENING: 'listening',
      THINKING: 'thinking',
      SPEAKING: 'speaking',
    };

    const STATUS_TEXT = {
      disconnected: 'Tap to connect',
      connecting: 'Connecting...',
      ready: 'Tap to speak',
      listening: 'Listening...',
      thinking: 'Thinking...',
      speaking: 'AI is speaking',
    };

    let currentState = STATE.DISCONNECTED;

    function setState(newState) {
      const prev = currentState;
      currentState = newState;
      console.log('[voice] state:', prev, '->', newState);

      // Update mic button
      const micBtn = document.getElementById('mic-btn');
      micBtn.setAttribute('data-state', newState);

      // Update body data-state for status text color
      document.body.setAttribute('data-state', newState);

      // Update status text
      document.getElementById('status-text').textContent = STATUS_TEXT[newState] || '';

      // Enable/disable text input
      var textInput = document.getElementById('text-input');
      var textSendBtn = document.getElementById('text-send-btn');
      if (textInput && textSendBtn) {
        var connected = newState !== STATE.DISCONNECTED && newState !== STATE.CONNECTING;
        textInput.disabled = !connected;
        textSendBtn.disabled = !connected;
        if (!connected) {
          textInput.placeholder = 'Connect to start typing';
        } else {
          textInput.placeholder = 'Type a message...';
        }
      }
    }

    // ── Settings Dropdown ────────────────────────────────────────────────────

    function toggleSettings() {
      var btn = document.getElementById('settings-btn');
      var dropdown = document.getElementById('settings-dropdown');
      var isOpen = dropdown.classList.contains('open');
      if (isOpen) {
        closeSettings();
      } else {
        btn.classList.add('open');
        dropdown.classList.add('open');
      }
    }

    function closeSettings() {
      document.getElementById('settings-btn').classList.remove('open');
      document.getElementById('settings-dropdown').classList.remove('open');
    }

    // Close settings when clicking outside
    document.addEventListener('click', function(e) {
      var actions = document.querySelector('.header-actions');
      if (actions && !actions.contains(e.target)) {
        closeSettings();
      }
    });

    // ── WebSocket Manager ──────────────────────────────────────────────────────

    let ws = null;
    let _gotReadyState = false;

    async function connectVoice() {
      if (currentState !== STATE.DISCONNECTED) return;
      setState(STATE.CONNECTING);
      requestWakeLock();

      // Clear transcript for new session
      document.getElementById('transcript').innerHTML = '';
      lastTranscriptSpeaker = null;
      lastTranscriptEl = null;
      _gotReadyState = false;

      // Fetch session token
      let token;
      try {
        const resp = await fetch('/api/voice/token');
        if (!resp.ok) {
          throw new Error('Failed to get voice token: ' + resp.status);
        }
        const data = await resp.json();
        token = data.token;
      } catch (err) {
        showError('Could not connect to voice service. ' + err.message);
        setState(STATE.DISCONNECTED);
        return;
      }

      // Open WebSocket
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      try {
        ws = new WebSocket(proto + '//' + location.host + '/ws/voice?token=' + token + '&voice=' + encodeURIComponent(selectedVoice));
        ws.binaryType = 'arraybuffer';
      } catch (err) {
        showError('WebSocket connection failed.');
        setState(STATE.DISCONNECTED);
        return;
      }

      ws.onopen = function() {
        console.log('[voice] WebSocket connected, waiting for ready...');
      };

      ws.onmessage = function(event) {
        if (typeof event.data === 'string') {
          try {
            var msg = JSON.parse(event.data);
            handleProtocolMessage(msg);
          } catch (e) {
            console.warn('[voice] invalid JSON message:', e);
          }
        } else {
          handleAudioData(new Uint8Array(event.data));
        }
      };

      ws.onclose = function(event) {
        console.log('[voice] WebSocket closed, code:', event.code, 'reason:', event.reason);
        setState(STATE.DISCONNECTED);
        if (event.code === 1000 && !_gotReadyState) {
          showError('Voice setup failed. Check your Gemini API key in settings.');
        } else if (event.code !== 1000) {
          showError('Connection lost (code ' + event.code + '). Tap mic to reconnect.');
        }
        ws = null;
      };

      ws.onerror = function() {
        showError('Connection error. Check your network.');
      };
    }

    function disconnectVoice() {
      releaseWakeLock();
      if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
        ws.close(1000);
      }
      ws = null;
      // Reset transcript tracking (keep content for reading)
      lastTranscriptSpeaker = null;
      lastTranscriptEl = null;
      // Audio cleanup
      if (isCapturing) {
        stopCapture();
      }
      if (playback) {
        playback.clearQueue();
        playback = null;
      }
      if (visualizerAnimId) {
        cancelAnimationFrame(visualizerAnimId);
        visualizerAnimId = null;
      }
      analyserNode = null;
      if (audioContext) {
        audioContext.close();
        audioContext = null;
      }
      setState(STATE.DISCONNECTED);
      startVisualizer();
    }

    function handleProtocolMessage(msg) {
      switch (msg.type) {
        case 'ready':
          _gotReadyState = true;
          setState(STATE.READY);
          break;
        case 'transcript':
          addTranscript(msg.speaker, msg.text);
          // AI transcript while user is speaking -> THINKING
          if (msg.speaker === 'ai' && currentState === STATE.LISTENING) {
            setState(STATE.THINKING);
          }
          break;
        case 'interrupted':
          handleInterruption();
          break;
        case 'tool_status':
          addToolStatus(msg.name, msg.status, msg.result || '');
          break;
        case 'error':
          showError('Server: ' + (msg.message || 'Unknown error'));
          console.error('[voice] server error:', msg.message);
          break;
        default:
          console.log('[voice] unknown message type:', msg.type);
      }
    }

    // ── AudioWorklet Processor Code ───────────────────────────────────────────

    var WORKLET_CODE = [
      'class PCMCaptureProcessor extends AudioWorkletProcessor {',
      '  constructor() {',
      '    super();',
      '    this.buffer = new Int16Array(2048);',
      '    this.writeIndex = 0;',
      '  }',
      '  process(inputs) {',
      '    var input = inputs[0];',
      '    if (!input || !input[0]) return true;',
      '    var samples = input[0];',
      '    for (var i = 0; i < samples.length; i++) {',
      '      var s = Math.max(-1, Math.min(1, samples[i]));',
      '      this.buffer[this.writeIndex++] = s * 0x7FFF;',
      '      if (this.writeIndex >= this.buffer.length) {',
      '        this.port.postMessage(this.buffer.buffer.slice(0));',
      '        this.writeIndex = 0;',
      '      }',
      '    }',
      '    return true;',
      '  }',
      '}',
      "registerProcessor('pcm-capture', PCMCaptureProcessor);"
    ].join('\n');

    // ── Audio State ────────────────────────────────────────────────────────────

    var audioContext = null;
    var captureStream = null;
    var captureNode = null;
    var captureSource = null;
    var isCapturing = false;
    var playback = null;
    var analyserNode = null;
    var visualizerAnimId = null;

    // ── AudioPlayback Class ────────────────────────────────────────────────────

    function AudioPlayback(ctx) {
      this.ctx = ctx;
      this.queue = [];
      this.scheduledTime = 0;
      this.playing = false;
      this.scheduledSources = [];
      this.SCHEDULE_AHEAD = 0.2;
      this.INITIAL_BUFFER = 0.1;
      this._rafId = null;
      this.analyserNode = null;
    }

    AudioPlayback.prototype.addPCM16 = function(chunk) {
      var float32 = new Float32Array(chunk.length / 2);
      var view = new DataView(chunk.buffer, chunk.byteOffset, chunk.byteLength);
      for (var i = 0; i < float32.length; i++) {
        float32[i] = view.getInt16(i * 2, true) / 32768;
      }
      this.queue.push(float32);
      if (!this.playing) {
        this.playing = true;
        this.scheduledTime = this.ctx.currentTime + this.INITIAL_BUFFER;
        this._scheduleNext();
      }
    };

    AudioPlayback.prototype._scheduleNext = function() {
      var self = this;
      while (this.queue.length > 0 &&
             this.scheduledTime < this.ctx.currentTime + this.SCHEDULE_AHEAD) {
        var samples = this.queue.shift();
        var buffer = this.ctx.createBuffer(1, samples.length, 24000);
        buffer.getChannelData(0).set(samples);
        var source = this.ctx.createBufferSource();
        source.buffer = buffer;
        source.connect(this.analyserNode || this.ctx.destination);
        source.onended = (function(src) {
          return function() {
            var idx = self.scheduledSources.indexOf(src);
            if (idx !== -1) self.scheduledSources.splice(idx, 1);
            if (self.queue.length === 0 && self.scheduledSources.length === 0 && self.playing) {
              self.playing = false;
              if (currentState === STATE.SPEAKING) {
                setState(STATE.READY);
              }
            }
          };
        })(source);
        source.start(this.scheduledTime);
        this.scheduledSources.push(source);
        this.scheduledTime += samples.length / 24000;
      }
      if (this.queue.length > 0 || this.scheduledSources.length > 0) {
        this._rafId = requestAnimationFrame(function() { self._scheduleNext(); });
      }
    };

    AudioPlayback.prototype.clearQueue = function() {
      this.queue = [];
      for (var i = 0; i < this.scheduledSources.length; i++) {
        try { this.scheduledSources[i].stop(); } catch(e) { /* may already be stopped */ }
      }
      this.scheduledSources = [];
      this.playing = false;
      this.scheduledTime = 0;
      if (this._rafId) {
        cancelAnimationFrame(this._rafId);
        this._rafId = null;
      }
    };

    AudioPlayback.prototype.setAnalyser = function(node) {
      this.analyserNode = node;
    };

    // ── Audio Capture ──────────────────────────────────────────────────────────

    async function startCapture() {
      // Create AudioContext inside user gesture
      if (!audioContext) {
        audioContext = new AudioContext();
      }
      await audioContext.resume();
      if (audioContext.state !== 'running') {
        showError('Browser blocked audio. Tap mic again.');
        return;
      }

      // Check AudioWorklet support
      if (!audioContext.audioWorklet) {
        showError("Your browser doesn't support AudioWorklet. Use Chrome or Edge.");
        return;
      }

      // Request microphone via getUserMedia
      try {
        captureStream = await navigator.mediaDevices.getUserMedia({
          audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true }
        });
      } catch (err) {
        if (err.name === 'NotAllowedError') {
          showError('Microphone access denied. Allow mic access in browser settings and reload.');
        } else if (err.name === 'NotFoundError') {
          showError('No microphone found. Connect a mic and reload.');
        } else {
          showError('Microphone error: ' + err.message);
        }
        return;
      }

      // Load AudioWorklet via Blob URL
      try {
        var blob = new Blob([WORKLET_CODE], { type: 'application/javascript' });
        var url = URL.createObjectURL(blob);
        await audioContext.audioWorklet.addModule(url);
        URL.revokeObjectURL(url);
      } catch (err) {
        console.warn('[voice] AudioWorklet load error, may already be registered:', err);
      }

      // Create AnalyserNode for visualizer
      if (!analyserNode) {
        analyserNode = audioContext.createAnalyser();
        analyserNode.fftSize = 256;
        analyserNode.smoothingTimeConstant = 0.8;
        analyserNode.connect(audioContext.destination);
        if (playback) {
          playback.setAnalyser(analyserNode);
        }
      }

      // Create capture chain
      captureSource = audioContext.createMediaStreamSource(captureStream);
      captureNode = new AudioWorkletNode(audioContext, 'pcm-capture');
      captureNode.port.onmessage = function(e) {
        if (ws && ws.readyState === WebSocket.OPEN && isCapturing) {
          ws.send(new Uint8Array(e.data));
        }
      };
      captureSource.connect(captureNode);
      captureNode.connect(audioContext.destination);
      captureSource.connect(analyserNode);

      // Create playback if needed
      if (!playback) {
        playback = new AudioPlayback(audioContext);
        if (analyserNode) {
          playback.setAnalyser(analyserNode);
        }
      }

      isCapturing = true;
      setState(STATE.LISTENING);
      startVisualizer();
    }

    function stopCapture() {
      isCapturing = false;
      if (captureNode) {
        try { captureNode.disconnect(); } catch(e) {}
        captureNode = null;
      }
      if (captureSource) {
        try { captureSource.disconnect(); } catch(e) {}
        captureSource = null;
      }
      if (captureStream) {
        captureStream.getTracks().forEach(function(t) { t.stop(); });
        captureStream = null;
      }
      setState(STATE.READY);
    }

    // ── Audio Data Handler ─────────────────────────────────────────────────────

    function handleAudioData(data) {
      if (!audioContext || audioContext.state !== 'running') return;
      if (!playback) {
        playback = new AudioPlayback(audioContext);
        if (analyserNode) {
          playback.setAnalyser(analyserNode);
        }
      }
      playback.addPCM16(data);
      if (currentState !== STATE.SPEAKING) {
        setState(STATE.SPEAKING);
      }
    }

    // ── Transcript Display ───────────────────────────────────────────────────

    var lastTranscriptSpeaker = null;
    var lastTranscriptEl = null;

    function addTranscript(speaker, text) {
      if (speaker === lastTranscriptSpeaker && lastTranscriptEl) {
        // Update existing message (Gemini sends incremental updates)
        lastTranscriptEl.textContent = text;
      } else {
        // Create new message bubble
        var el = document.createElement('div');
        el.className = 'transcript-msg ' + speaker;
        var label = document.createElement('div');
        label.className = 'speaker-label';
        label.textContent = speaker === 'user' ? 'You' : 'GooseClaw';
        var textEl = document.createElement('div');
        textEl.className = 'msg-text';
        textEl.textContent = text;
        el.appendChild(label);
        el.appendChild(textEl);
        document.getElementById('transcript').appendChild(el);
        lastTranscriptSpeaker = speaker;
        lastTranscriptEl = textEl;
      }
      autoScrollTranscript();
    }

    function autoScrollTranscript() {
      var container = document.getElementById('transcript');
      var threshold = 80;
      var isNearBottom = container.scrollHeight - container.scrollTop - container.clientHeight < threshold;
      if (isNearBottom) {
        container.scrollTop = container.scrollHeight;
      }
    }

    // ── Tool Status ──────────────────────────────────────────────────────────

    function escapeHtml(str) {
      var d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function addToolStatus(name, status, result) {
      var el = document.getElementById('tool-' + name.replace(/[^a-zA-Z0-9]/g, '-'));
      if (!el) {
        el = document.createElement('div');
        el.id = 'tool-' + name.replace(/[^a-zA-Z0-9]/g, '-');
        document.getElementById('transcript').appendChild(el);
      }
      el.className = 'tool-status' + (status === 'error' ? ' error' : '') +
                     (status === 'cancelled' ? ' cancelled' : '');

      var stateText = status === 'running' ? 'running' :
                      status === 'done' ? 'done' :
                      status === 'error' ? 'failed' : 'cancelled';

      el.innerHTML = '<div class="tool-badge">' +
          '<span class="tool-name">' + escapeHtml(name) + '</span>' +
          '<span class="tool-state ' + status + '">' + stateText + '</span>' +
          '</div>' +
          (result ? '<div class="tool-result">' + escapeHtml(result) + '</div>' : '');

      // Reset transcript speaker tracking so next transcript creates a new bubble
      lastTranscriptSpeaker = null;
      lastTranscriptEl = null;
      autoScrollTranscript();
    }

    // ── Interruption (Barge-in) ────────────────────────────────────────────────

    function handleInterruption() {
      if (playback) {
        playback.clearQueue();
      }
      if (isCapturing) {
        setState(STATE.LISTENING);
      } else {
        setState(STATE.READY);
      }
    }

    // ── Error Handler ──────────────────────────────────────────────────────────

    let errorTimer = null;

    function showError(message, duration) {
      duration = duration || 8000;
      var banner = document.getElementById('error-banner');
      banner.querySelector('.error-text').textContent = message;
      banner.classList.add('visible');

      if (errorTimer) clearTimeout(errorTimer);
      errorTimer = setTimeout(function() {
        clearError();
      }, duration);
    }

    function clearError() {
      var banner = document.getElementById('error-banner');
      banner.classList.remove('visible');
      if (errorTimer) {
        clearTimeout(errorTimer);
        errorTimer = null;
      }
    }

    // ── Visualizer ──────────────────────────────────────────────────────────────

    function startVisualizer() {
      if (visualizerAnimId) {
        cancelAnimationFrame(visualizerAnimId);
        visualizerAnimId = null;
      }
      var canvas = document.getElementById('visualizer-canvas');
      if (!canvas) return;
      var ctx = canvas.getContext('2d');
      var dpr = window.devicePixelRatio || 1;
      canvas.width = canvas.clientWidth * dpr;
      canvas.height = canvas.clientHeight * dpr;
      ctx.scale(dpr, dpr);
      var w = canvas.clientWidth;
      var h = canvas.clientHeight;
      var cx = w / 2;
      var cy = h / 2;
      var dataArray = analyserNode ? new Uint8Array(analyserNode.frequencyBinCount) : null;
      var time = 0;

      function draw() {
        visualizerAnimId = requestAnimationFrame(draw);
        ctx.clearRect(0, 0, w, h);
        time += 0.016;

        var amplitude = 0;
        if (analyserNode && dataArray) {
          analyserNode.getByteFrequencyData(dataArray);
          var sum = 0;
          for (var i = 0; i < dataArray.length; i++) sum += dataArray[i];
          amplitude = sum / dataArray.length / 255;
        }

        var baseRadius = Math.min(w, h) * 0.18;
        var maxExpand = Math.min(w, h) * 0.22;
        var radius = baseRadius + amplitude * maxExpand;

        var r, g, b, alpha;
        switch (currentState) {
          case STATE.DISCONNECTED:
            r = 70; g = 70; b = 75; alpha = 0.2 + 0.05 * Math.sin(time * 1.5);
            break;
          case STATE.CONNECTING:
            r = 160; g = 160; b = 170; alpha = 0.25 + 0.15 * Math.sin(time * 2.5);
            break;
          case STATE.READY:
            r = 124; g = 106; b = 239; alpha = 0.4 + 0.1 * Math.sin(time * 1.2);
            break;
          case STATE.LISTENING:
            r = 239; g = 68; b = 68; alpha = 0.35 + amplitude * 0.55 + 0.05 * Math.sin(time * 3);
            break;
          case STATE.THINKING:
            r = 245; g = 158; b = 11; alpha = 0.4 + 0.1 * Math.sin(time * 2);
            break;
          case STATE.SPEAKING:
            r = 34; g = 197; b = 94; alpha = 0.35 + amplitude * 0.55;
            break;
          default:
            r = 70; g = 70; b = 75; alpha = 0.2;
        }

        // Ambient outer glow (large, soft)
        var ambient = ctx.createRadialGradient(cx, cy, radius * 0.3, cx, cy, radius * 2.2);
        ambient.addColorStop(0, 'rgba(' + r + ', ' + g + ', ' + b + ', ' + (alpha * 0.2) + ')');
        ambient.addColorStop(0.5, 'rgba(' + r + ', ' + g + ', ' + b + ', ' + (alpha * 0.08) + ')');
        ambient.addColorStop(1, 'rgba(' + r + ', ' + g + ', ' + b + ', 0)');
        ctx.beginPath();
        ctx.arc(cx, cy, radius * 2.2, 0, Math.PI * 2);
        ctx.fillStyle = ambient;
        ctx.fill();

        // Mid glow
        var midGlow = ctx.createRadialGradient(cx, cy, radius * 0.5, cx, cy, radius * 1.5);
        midGlow.addColorStop(0, 'rgba(' + r + ', ' + g + ', ' + b + ', ' + (alpha * 0.35) + ')');
        midGlow.addColorStop(1, 'rgba(' + r + ', ' + g + ', ' + b + ', 0)');
        ctx.beginPath();
        ctx.arc(cx, cy, radius * 1.5, 0, Math.PI * 2);
        ctx.fillStyle = midGlow;
        ctx.fill();

        // Main orb body
        var main = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
        main.addColorStop(0, 'rgba(' + Math.min(255, r + 40) + ', ' + Math.min(255, g + 40) + ', ' + Math.min(255, b + 40) + ', ' + (alpha * 0.9) + ')');
        main.addColorStop(0.7, 'rgba(' + r + ', ' + g + ', ' + b + ', ' + (alpha * 0.7) + ')');
        main.addColorStop(1, 'rgba(' + r + ', ' + g + ', ' + b + ', ' + (alpha * 0.3) + ')');
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.fillStyle = main;
        ctx.fill();

        // Inner specular highlight (top-left)
        var specular = ctx.createRadialGradient(
          cx - radius * 0.25, cy - radius * 0.25, 0,
          cx, cy, radius * 0.8
        );
        specular.addColorStop(0, 'rgba(255, 255, 255, ' + (alpha * 0.18) + ')');
        specular.addColorStop(0.5, 'rgba(255, 255, 255, ' + (alpha * 0.04) + ')');
        specular.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.fillStyle = specular;
        ctx.fill();

        // Edge rim light
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(' + r + ', ' + g + ', ' + b + ', ' + (alpha * 0.2) + ')';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }

      draw();
    }

    // ── Mic Button Handler ─────────────────────────────────────────────────────

    function onMicClick() {
      switch (currentState) {
        case STATE.DISCONNECTED:
          connectVoice();
          break;
        case STATE.CONNECTING:
          // Already connecting, do nothing
          break;
        case STATE.READY:
          startCapture();
          break;
        case STATE.LISTENING:
          stopCapture();
          break;
        case STATE.THINKING:
          // Do nothing while AI is thinking
          break;
        case STATE.SPEAKING:
          // Barge-in: stop playback and start capturing
          handleInterruption();
          startCapture();
          break;
      }
    }

    // ── Keyboard Shortcuts ────────────────────────────────────────────────────

    var spaceHeld = false;

    document.addEventListener('keydown', function(e) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA'
          || e.target.isContentEditable) return;

      if (e.code === 'Space') {
        e.preventDefault();
        if (e.repeat) return;
        if (currentState === STATE.DISCONNECTED) {
          connectVoice();
        } else if (currentState === STATE.READY) {
          spaceHeld = true;
          startCapture();
        } else if (currentState === STATE.SPEAKING) {
          spaceHeld = true;
          handleInterruption();
          startCapture();
        }
      } else if (e.code === 'Escape') {
        e.preventDefault();
        if (currentState !== STATE.DISCONNECTED) {
          disconnectVoice();
        }
      }
    });

    document.addEventListener('keyup', function(e) {
      if (e.code === 'Space' && spaceHeld) {
        spaceHeld = false;
        if (currentState === STATE.LISTENING) {
          stopCapture();
        }
      }
    });

    // ── Text Input Handler ──────────────────────────────────────────────────

    function sendTextMessage(text) {
      if (!text || !text.trim()) return;
      if (!ws || ws.readyState !== WebSocket.OPEN) return;

      var msg = JSON.stringify({
        realtimeInput: { text: text.trim() }
      });
      ws.send(msg);
      addTranscript('user', text.trim());
    }

    function sendTextFromInput() {
      var input = document.getElementById('text-input');
      if (!input) return;
      sendTextMessage(input.value);
      input.value = '';
    }

    document.getElementById('text-input').addEventListener('keydown', function(e) {
      if (e.code === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendTextFromInput();
      }
    });

    document.getElementById('text-send-btn').addEventListener('click', sendTextFromInput);

    // ── Screen Wake Lock ────────────────────────────────────────────────────

    var wakeLock = null;

    async function requestWakeLock() {
      if (!('wakeLock' in navigator)) return;
      try {
        wakeLock = await navigator.wakeLock.request('screen');
        wakeLock.addEventListener('release', function() {
          wakeLock = null;
        });
      } catch (err) {
        console.log('[voice] wake lock request failed:', err.message);
      }
    }

    function releaseWakeLock() {
      if (wakeLock) {
        wakeLock.release();
        wakeLock = null;
      }
    }

    document.addEventListener('visibilitychange', function() {
      if (document.visibilityState === 'visible'
          && currentState !== STATE.DISCONNECTED
          && wakeLock === null) {
        requestWakeLock();
      }
    });

    // ── Bottom Sheet Helpers ──────────────────────────────────────────────

    function openSheet(sheetId) {
      document.getElementById('sheet-overlay').classList.add('active');
      document.getElementById(sheetId).classList.add('active');
    }

    function closeSheet(sheetId) {
      document.getElementById('sheet-overlay').classList.remove('active');
      document.getElementById(sheetId).classList.remove('active');
    }

    function closeAllSheets() {
      document.getElementById('sheet-overlay').classList.remove('active');
      document.getElementById('history-panel').classList.remove('active');
      document.getElementById('voice-picker').classList.remove('active');
    }

    // ── History Panel ──────────────────────────────────────────────────────

    function toggleHistory() {
      var panel = document.getElementById('history-panel');
      if (panel.classList.contains('active')) {
        closeSheet('history-panel');
      } else {
        closeAllSheets();
        openSheet('history-panel');
        loadHistory();
      }
    }

    async function loadHistory() {
      var list = document.getElementById('history-list');
      var detail = document.getElementById('session-detail');
      list.classList.remove('hidden');
      detail.classList.remove('active');
      list.innerHTML = '<div class="history-empty">Loading...</div>';
      try {
        var resp = await fetch('/api/voice/sessions');
        if (!resp.ok) throw new Error('Failed to load');
        var data = await resp.json();
        list.innerHTML = '';
        if (!data.sessions || data.sessions.length === 0) {
          list.innerHTML = '<div class="history-empty">No voice sessions yet</div>';
          return;
        }
        data.sessions.forEach(function(s) {
          var el = document.createElement('div');
          el.className = 'history-item';
          var d = new Date(s.started_at);
          var dur = s.duration_seconds ? Math.round(s.duration_seconds / 60) + ' min' : '';
          el.innerHTML = '<div class="history-date">' + d.toLocaleDateString() + ' ' + d.toLocaleTimeString() + '</div>' +
                         '<div class="history-preview">' + escapeHtml(s.preview || 'No preview') + '</div>' +
                         '<div class="history-meta">' + escapeHtml(s.voice_name || 'Aoede') + (dur ? ' \u00b7 ' + dur : '') +
                         (s.memory_extracted ? ' \u00b7 memorized' : '') + '</div>';
          el.onclick = function() { viewSession(s.id); };
          list.appendChild(el);
        });
      } catch(e) {
        list.innerHTML = '<div class="history-empty">Failed to load history</div>';
      }
    }

    async function viewSession(id) {
      var list = document.getElementById('history-list');
      var detail = document.getElementById('session-detail');
      var transcript = document.getElementById('session-transcript');
      var title = document.getElementById('session-detail-title');
      list.classList.add('hidden');
      detail.classList.add('active');
      transcript.innerHTML = '<div class="history-empty">Loading...</div>';
      try {
        var resp = await fetch('/api/voice/sessions/' + id);
        if (!resp.ok) throw new Error('Not found');
        var data = await resp.json();
        var d = new Date(data.started_at);
        title.textContent = d.toLocaleDateString() + ' ' + d.toLocaleTimeString();
        transcript.innerHTML = '';
        (data.transcript || []).forEach(function(entry) {
          var el = document.createElement('div');
          if (entry.speaker === 'tool') {
            el.className = 'session-msg tool';
            el.textContent = '\ud83d\udd27 ' + (entry.name || 'tool') + ' \u2014 ' + (entry.status || '');
          } else {
            el.className = 'session-msg ' + entry.speaker;
            el.innerHTML = '<div class="session-msg-speaker">' + (entry.speaker === 'user' ? 'You' : 'AI') + '</div>' +
                           escapeHtml(entry.text || '');
          }
          transcript.appendChild(el);
        });
        if (!data.transcript || data.transcript.length === 0) {
          transcript.innerHTML = '<div class="history-empty">No transcript</div>';
        }
      } catch(e) {
        transcript.innerHTML = '<div class="history-empty">Session not found</div>';
      }
    }

    function backToHistory() {
      document.getElementById('history-list').classList.remove('hidden');
      document.getElementById('session-detail').classList.remove('active');
    }

    // ── Voice Picker ──────────────────────────────────────────────────────

    var selectedVoice = 'Aoede';

    function toggleVoicePicker() {
      var picker = document.getElementById('voice-picker');
      if (picker.classList.contains('active')) {
        closeSheet('voice-picker');
      } else {
        closeAllSheets();
        openSheet('voice-picker');
        loadVoices();
      }
    }

    async function loadVoices() {
      var grid = document.getElementById('voice-grid');
      grid.innerHTML = '';
      try {
        var resp = await fetch('/api/voice/preference');
        if (!resp.ok) throw new Error('Failed');
        var data = await resp.json();
        selectedVoice = data.voice_name || 'Aoede';
        (data.voices || []).forEach(function(v) {
          var el = document.createElement('div');
          el.className = 'voice-option' + (v.name === selectedVoice ? ' selected' : '');
          el.innerHTML = '<div class="voice-option-name">' + escapeHtml(v.name) + '</div>' +
                         '<div class="voice-option-style">' + escapeHtml(v.style) + '</div>';
          el.onclick = function() { selectVoice(v.name); };
          grid.appendChild(el);
        });
      } catch(e) {
        grid.innerHTML = '<div class="history-empty">Failed to load voices</div>';
      }
    }

    async function selectVoice(name) {
      try {
        var resp = await fetch('/api/voice/preference', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({voice_name: name})
        });
        if (resp.ok) {
          selectedVoice = name;
          // Update UI selection
          var options = document.querySelectorAll('.voice-option');
          options.forEach(function(el) {
            el.classList.toggle('selected', el.querySelector('.voice-option-name').textContent === name);
          });
        }
      } catch(e) {
        // silently fail
      }
    }

    // Load voice preference on page load (fire-and-forget)
    fetch('/api/voice/preference').then(function(r) { return r.json(); }).then(function(d) {
      selectedVoice = d.voice_name || 'Aoede';
    }).catch(function() {});

    // Start idle visualizer on load
    startVisualizer();
  </script>
</body>
