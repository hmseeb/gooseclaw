<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Voice - GooseClaw</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #1a1a1a;
      flex-shrink: 0;
    }

    #header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    #disconnect-btn {
      background: none;
      border: 1px solid #333;
      color: #999;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    #disconnect-btn:hover {
      border-color: #ef4444;
      color: #ef4444;
    }

    /* Error banner */
    #error-banner {
      display: none;
      background: #7f1d1d;
      color: #fecaca;
      padding: 10px 16px;
      font-size: 13px;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      animation: slideDown 0.2s ease;
    }

    #error-banner.visible {
      display: flex;
    }

    #error-banner .error-text {
      flex: 1;
      margin-right: 12px;
    }

    #error-banner .error-close {
      background: none;
      border: none;
      color: #fecaca;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Visualizer container */
    #visualizer-container {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 0;
      min-height: 160px;
      flex-shrink: 0;
    }

    #visualizer-canvas {
      width: 160px;
      height: 160px;
    }

    /* Transcript area */
    #transcript {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    /* Transcript messages */
    .transcript-msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
      animation: fadeIn 0.2s ease;
    }

    .transcript-msg.user {
      align-self: flex-end;
      background: #7c6aef;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .transcript-msg.ai {
      align-self: flex-start;
      background: #1e1e1e;
      color: #e0e0e0;
      border-bottom-left-radius: 4px;
    }

    .transcript-msg .speaker-label {
      font-size: 11px;
      opacity: 0.6;
      margin-bottom: 2px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Controls */
    #controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 16px 24px;
      flex-shrink: 0;
    }

    #status-text {
      font-size: 13px;
      color: #666;
      margin-bottom: 12px;
      text-align: center;
      transition: color 0.3s;
    }

    #mic-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: none;
      background: #333;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      position: relative;
    }

    #mic-btn svg {
      width: 32px;
      height: 32px;
      fill: #e0e0e0;
    }

    /* Mic button states */
    #mic-btn[data-state="disconnected"] {
      background: #333;
    }

    #mic-btn[data-state="connecting"] {
      background: #555;
      animation: pulse 1.5s infinite;
    }

    #mic-btn[data-state="ready"] {
      background: #7c6aef;
    }

    #mic-btn[data-state="listening"] {
      background: #ef4444;
      animation: pulse 1s infinite;
    }

    #mic-btn[data-state="thinking"] {
      background: #f59e0b;
      animation: pulse 1.2s infinite;
    }

    #mic-btn[data-state="speaking"] {
      background: #22c55e;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    /* Status text colors */
    body[data-state="disconnected"] #status-text { color: #666; }
    body[data-state="connecting"] #status-text { color: #999; }
    body[data-state="ready"] #status-text { color: #7c6aef; }
    body[data-state="listening"] #status-text { color: #ef4444; }
    body[data-state="thinking"] #status-text { color: #f59e0b; }
    body[data-state="speaking"] #status-text { color: #22c55e; }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      #mic-btn {
        width: 100px;
        height: 100px;
      }

      #mic-btn svg {
        width: 40px;
        height: 40px;
      }

      #visualizer-container {
        min-height: 120px;
        padding: 16px 0;
      }

      #visualizer-canvas {
        width: 120px;
        height: 120px;
      }
    }
  </style>
</head>
<body data-state="disconnected">

  <!-- Error banner -->
  <div id="error-banner">
    <span class="error-text"></span>
    <button class="error-close" onclick="clearError()">&times;</button>
  </div>

  <!-- Header -->
  <div id="header">
    <h1>GooseClaw Voice</h1>
    <button id="disconnect-btn" onclick="disconnectVoice()">Disconnect</button>
  </div>

  <!-- Visualizer -->
  <div id="visualizer-container">
    <canvas id="visualizer-canvas"></canvas>
  </div>

  <!-- Transcript -->
  <div id="transcript"></div>

  <!-- Controls -->
  <div id="controls">
    <div id="status-text">Tap to connect</div>
    <button id="mic-btn" data-state="disconnected" onclick="onMicClick()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
      </svg>
    </button>
  </div>

  <script>
    'use strict';

    // ── State Machine ──────────────────────────────────────────────────────────

    const STATE = {
      DISCONNECTED: 'disconnected',
      CONNECTING: 'connecting',
      READY: 'ready',
      LISTENING: 'listening',
      THINKING: 'thinking',
      SPEAKING: 'speaking',
    };

    const STATUS_TEXT = {
      disconnected: 'Tap to connect',
      connecting: 'Connecting...',
      ready: 'Tap to speak',
      listening: 'Listening...',
      thinking: 'Thinking...',
      speaking: 'AI is speaking',
    };

    let currentState = STATE.DISCONNECTED;

    function setState(newState) {
      const prev = currentState;
      currentState = newState;
      console.log('[voice] state:', prev, '->', newState);

      // Update mic button
      const micBtn = document.getElementById('mic-btn');
      micBtn.setAttribute('data-state', newState);

      // Update body data-state for status text color
      document.body.setAttribute('data-state', newState);

      // Update status text
      document.getElementById('status-text').textContent = STATUS_TEXT[newState] || '';
    }

    // ── WebSocket Manager ──────────────────────────────────────────────────────

    let ws = null;

    async function connectVoice() {
      if (currentState !== STATE.DISCONNECTED) return;
      setState(STATE.CONNECTING);

      // Clear transcript for new session
      document.getElementById('transcript').innerHTML = '';
      lastTranscriptSpeaker = null;
      lastTranscriptEl = null;

      // Fetch session token
      let token;
      try {
        const resp = await fetch('/api/voice/token');
        if (!resp.ok) {
          throw new Error('Failed to get voice token: ' + resp.status);
        }
        const data = await resp.json();
        token = data.token;
      } catch (err) {
        showError('Could not connect to voice service. ' + err.message);
        setState(STATE.DISCONNECTED);
        return;
      }

      // Open WebSocket
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      try {
        ws = new WebSocket(proto + '//' + location.host + '/ws/voice?token=' + token);
        ws.binaryType = 'arraybuffer';
      } catch (err) {
        showError('WebSocket connection failed.');
        setState(STATE.DISCONNECTED);
        return;
      }

      ws.onopen = function() {
        console.log('[voice] WebSocket connected, waiting for ready...');
      };

      ws.onmessage = function(event) {
        if (typeof event.data === 'string') {
          try {
            var msg = JSON.parse(event.data);
            handleProtocolMessage(msg);
          } catch (e) {
            console.warn('[voice] invalid JSON message:', e);
          }
        } else {
          handleAudioData(new Uint8Array(event.data));
        }
      };

      ws.onclose = function(event) {
        console.log('[voice] WebSocket closed, code:', event.code);
        setState(STATE.DISCONNECTED);
        if (event.code !== 1000) {
          showError('Connection lost. Tap mic to reconnect.');
        }
        ws = null;
      };

      ws.onerror = function() {
        showError('Connection error. Check your network.');
      };
    }

    function disconnectVoice() {
      if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
        ws.close(1000);
      }
      ws = null;
      // Reset transcript tracking (keep content for reading)
      lastTranscriptSpeaker = null;
      lastTranscriptEl = null;
      // Audio cleanup
      if (isCapturing) {
        stopCapture();
      }
      if (playback) {
        playback.clearQueue();
        playback = null;
      }
      if (visualizerAnimId) {
        cancelAnimationFrame(visualizerAnimId);
        visualizerAnimId = null;
      }
      analyserNode = null;
      if (audioContext) {
        audioContext.close();
        audioContext = null;
      }
      setState(STATE.DISCONNECTED);
      startVisualizer();
    }

    function handleProtocolMessage(msg) {
      switch (msg.type) {
        case 'ready':
          setState(STATE.READY);
          break;
        case 'transcript':
          addTranscript(msg.speaker, msg.text);
          // AI transcript while user is speaking -> THINKING
          if (msg.speaker === 'ai' && currentState === STATE.LISTENING) {
            setState(STATE.THINKING);
          }
          break;
        case 'interrupted':
          handleInterruption();
          break;
        default:
          console.log('[voice] unknown message type:', msg.type);
      }
    }

    // ── AudioWorklet Processor Code ───────────────────────────────────────────

    var WORKLET_CODE = [
      'class PCMCaptureProcessor extends AudioWorkletProcessor {',
      '  constructor() {',
      '    super();',
      '    this.buffer = new Int16Array(2048);',
      '    this.writeIndex = 0;',
      '  }',
      '  process(inputs) {',
      '    var input = inputs[0];',
      '    if (!input || !input[0]) return true;',
      '    var samples = input[0];',
      '    for (var i = 0; i < samples.length; i++) {',
      '      var s = Math.max(-1, Math.min(1, samples[i]));',
      '      this.buffer[this.writeIndex++] = s * 0x7FFF;',
      '      if (this.writeIndex >= this.buffer.length) {',
      '        this.port.postMessage(this.buffer.buffer.slice(0));',
      '        this.writeIndex = 0;',
      '      }',
      '    }',
      '    return true;',
      '  }',
      '}',
      "registerProcessor('pcm-capture', PCMCaptureProcessor);"
    ].join('\n');

    // ── Audio State ────────────────────────────────────────────────────────────

    var audioContext = null;
    var captureStream = null;
    var captureNode = null;
    var captureSource = null;
    var isCapturing = false;
    var playback = null;
    var analyserNode = null;
    var visualizerAnimId = null;

    // ── AudioPlayback Class ────────────────────────────────────────────────────

    function AudioPlayback(ctx) {
      this.ctx = ctx;
      this.queue = [];
      this.scheduledTime = 0;
      this.playing = false;
      this.scheduledSources = [];
      this.SCHEDULE_AHEAD = 0.2;
      this.INITIAL_BUFFER = 0.1;
      this._rafId = null;
      this.analyserNode = null;
    }

    AudioPlayback.prototype.addPCM16 = function(chunk) {
      var float32 = new Float32Array(chunk.length / 2);
      var view = new DataView(chunk.buffer, chunk.byteOffset, chunk.byteLength);
      for (var i = 0; i < float32.length; i++) {
        float32[i] = view.getInt16(i * 2, true) / 32768;
      }
      this.queue.push(float32);
      if (!this.playing) {
        this.playing = true;
        this.scheduledTime = this.ctx.currentTime + this.INITIAL_BUFFER;
        this._scheduleNext();
      }
    };

    AudioPlayback.prototype._scheduleNext = function() {
      var self = this;
      while (this.queue.length > 0 &&
             this.scheduledTime < this.ctx.currentTime + this.SCHEDULE_AHEAD) {
        var samples = this.queue.shift();
        var buffer = this.ctx.createBuffer(1, samples.length, 24000);
        buffer.getChannelData(0).set(samples);
        var source = this.ctx.createBufferSource();
        source.buffer = buffer;
        source.connect(this.analyserNode || this.ctx.destination);
        source.onended = (function(src) {
          return function() {
            var idx = self.scheduledSources.indexOf(src);
            if (idx !== -1) self.scheduledSources.splice(idx, 1);
            if (self.queue.length === 0 && self.scheduledSources.length === 0 && self.playing) {
              self.playing = false;
              if (currentState === STATE.SPEAKING) {
                setState(STATE.READY);
              }
            }
          };
        })(source);
        source.start(this.scheduledTime);
        this.scheduledSources.push(source);
        this.scheduledTime += samples.length / 24000;
      }
      if (this.queue.length > 0 || this.scheduledSources.length > 0) {
        this._rafId = requestAnimationFrame(function() { self._scheduleNext(); });
      }
    };

    AudioPlayback.prototype.clearQueue = function() {
      this.queue = [];
      for (var i = 0; i < this.scheduledSources.length; i++) {
        try { this.scheduledSources[i].stop(); } catch(e) { /* may already be stopped */ }
      }
      this.scheduledSources = [];
      this.playing = false;
      this.scheduledTime = 0;
      if (this._rafId) {
        cancelAnimationFrame(this._rafId);
        this._rafId = null;
      }
    };

    AudioPlayback.prototype.setAnalyser = function(node) {
      this.analyserNode = node;
    };

    // ── Audio Capture ──────────────────────────────────────────────────────────

    async function startCapture() {
      // Create AudioContext inside user gesture
      if (!audioContext) {
        audioContext = new AudioContext();
      }
      await audioContext.resume();
      if (audioContext.state !== 'running') {
        showError('Browser blocked audio. Tap mic again.');
        return;
      }

      // Check AudioWorklet support
      if (!audioContext.audioWorklet) {
        showError("Your browser doesn't support AudioWorklet. Use Chrome or Edge.");
        return;
      }

      // Request microphone via getUserMedia
      try {
        captureStream = await navigator.mediaDevices.getUserMedia({
          audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true }
        });
      } catch (err) {
        if (err.name === 'NotAllowedError') {
          showError('Microphone access denied. Allow mic access in browser settings and reload.');
        } else if (err.name === 'NotFoundError') {
          showError('No microphone found. Connect a mic and reload.');
        } else {
          showError('Microphone error: ' + err.message);
        }
        return;
      }

      // Load AudioWorklet via Blob URL
      try {
        var blob = new Blob([WORKLET_CODE], { type: 'application/javascript' });
        var url = URL.createObjectURL(blob);
        await audioContext.audioWorklet.addModule(url);
        URL.revokeObjectURL(url);
      } catch (err) {
        console.warn('[voice] AudioWorklet load error, may already be registered:', err);
      }

      // Create AnalyserNode for visualizer
      if (!analyserNode) {
        analyserNode = audioContext.createAnalyser();
        analyserNode.fftSize = 256;
        analyserNode.smoothingTimeConstant = 0.8;
        analyserNode.connect(audioContext.destination);
        if (playback) {
          playback.setAnalyser(analyserNode);
        }
      }

      // Create capture chain
      captureSource = audioContext.createMediaStreamSource(captureStream);
      captureNode = new AudioWorkletNode(audioContext, 'pcm-capture');
      captureNode.port.onmessage = function(e) {
        if (ws && ws.readyState === WebSocket.OPEN && isCapturing) {
          ws.send(new Uint8Array(e.data));
        }
      };
      captureSource.connect(captureNode);
      captureNode.connect(audioContext.destination);
      captureSource.connect(analyserNode);

      // Create playback if needed
      if (!playback) {
        playback = new AudioPlayback(audioContext);
        if (analyserNode) {
          playback.setAnalyser(analyserNode);
        }
      }

      isCapturing = true;
      setState(STATE.LISTENING);
      startVisualizer();
    }

    function stopCapture() {
      isCapturing = false;
      if (captureNode) {
        try { captureNode.disconnect(); } catch(e) {}
        captureNode = null;
      }
      if (captureSource) {
        try { captureSource.disconnect(); } catch(e) {}
        captureSource = null;
      }
      if (captureStream) {
        captureStream.getTracks().forEach(function(t) { t.stop(); });
        captureStream = null;
      }
      setState(STATE.READY);
    }

    // ── Audio Data Handler ─────────────────────────────────────────────────────

    function handleAudioData(data) {
      if (!audioContext || audioContext.state !== 'running') return;
      if (!playback) {
        playback = new AudioPlayback(audioContext);
        if (analyserNode) {
          playback.setAnalyser(analyserNode);
        }
      }
      playback.addPCM16(data);
      if (currentState !== STATE.SPEAKING) {
        setState(STATE.SPEAKING);
      }
    }

    // ── Transcript Display ───────────────────────────────────────────────────

    var lastTranscriptSpeaker = null;
    var lastTranscriptEl = null;

    function addTranscript(speaker, text) {
      if (speaker === lastTranscriptSpeaker && lastTranscriptEl) {
        // Update existing message (Gemini sends incremental updates)
        lastTranscriptEl.textContent = text;
      } else {
        // Create new message bubble
        var el = document.createElement('div');
        el.className = 'transcript-msg ' + speaker;
        var label = document.createElement('div');
        label.className = 'speaker-label';
        label.textContent = speaker === 'user' ? 'You' : 'GooseClaw';
        var textEl = document.createElement('div');
        textEl.className = 'msg-text';
        textEl.textContent = text;
        el.appendChild(label);
        el.appendChild(textEl);
        document.getElementById('transcript').appendChild(el);
        lastTranscriptSpeaker = speaker;
        lastTranscriptEl = textEl;
      }
      autoScrollTranscript();
    }

    function autoScrollTranscript() {
      var container = document.getElementById('transcript');
      var threshold = 80;
      var isNearBottom = container.scrollHeight - container.scrollTop - container.clientHeight < threshold;
      if (isNearBottom) {
        container.scrollTop = container.scrollHeight;
      }
    }

    // ── Interruption (Barge-in) ────────────────────────────────────────────────

    function handleInterruption() {
      if (playback) {
        playback.clearQueue();
      }
      if (isCapturing) {
        setState(STATE.LISTENING);
      } else {
        setState(STATE.READY);
      }
    }

    // ── Error Handler ──────────────────────────────────────────────────────────

    let errorTimer = null;

    function showError(message, duration) {
      duration = duration || 8000;
      var banner = document.getElementById('error-banner');
      banner.querySelector('.error-text').textContent = message;
      banner.classList.add('visible');

      if (errorTimer) clearTimeout(errorTimer);
      errorTimer = setTimeout(function() {
        clearError();
      }, duration);
    }

    function clearError() {
      var banner = document.getElementById('error-banner');
      banner.classList.remove('visible');
      if (errorTimer) {
        clearTimeout(errorTimer);
        errorTimer = null;
      }
    }

    // ── Visualizer ──────────────────────────────────────────────────────────────

    function startVisualizer() {
      if (visualizerAnimId) {
        cancelAnimationFrame(visualizerAnimId);
        visualizerAnimId = null;
      }
      var canvas = document.getElementById('visualizer-canvas');
      if (!canvas) return;
      var ctx = canvas.getContext('2d');
      var dpr = window.devicePixelRatio || 1;
      canvas.width = canvas.clientWidth * dpr;
      canvas.height = canvas.clientHeight * dpr;
      ctx.scale(dpr, dpr);
      var w = canvas.clientWidth;
      var h = canvas.clientHeight;
      var cx = w / 2;
      var cy = h / 2;
      var dataArray = analyserNode ? new Uint8Array(analyserNode.frequencyBinCount) : null;

      function draw() {
        visualizerAnimId = requestAnimationFrame(draw);
        ctx.clearRect(0, 0, w, h);

        var amplitude = 0;
        if (analyserNode && dataArray) {
          analyserNode.getByteFrequencyData(dataArray);
          var sum = 0;
          for (var i = 0; i < dataArray.length; i++) sum += dataArray[i];
          amplitude = sum / dataArray.length / 255;
        }

        var baseRadius = Math.min(w, h) * 0.15;
        var maxExpand = Math.min(w, h) * 0.2;
        var radius = baseRadius + amplitude * maxExpand;

        var r, g, b, alpha;
        switch (currentState) {
          case STATE.DISCONNECTED:
            r = 80; g = 80; b = 80; alpha = 0.3;
            break;
          case STATE.CONNECTING:
            r = 100; g = 100; b = 100; alpha = 0.5;
            break;
          case STATE.READY:
            r = 124; g = 106; b = 239; alpha = 0.5;
            break;
          case STATE.LISTENING:
            r = 239; g = 68; b = 68; alpha = 0.4 + amplitude * 0.6;
            break;
          case STATE.THINKING:
            r = 245; g = 158; b = 11; alpha = 0.5;
            break;
          case STATE.SPEAKING:
            r = 34; g = 197; b = 94; alpha = 0.4 + amplitude * 0.6;
            break;
          default:
            r = 80; g = 80; b = 80; alpha = 0.3;
        }

        // Outer glow
        var gradient = ctx.createRadialGradient(cx, cy, radius * 0.5, cx, cy, radius * 1.5);
        gradient.addColorStop(0, 'rgba(' + r + ', ' + g + ', ' + b + ', ' + (alpha * 0.3) + ')');
        gradient.addColorStop(1, 'rgba(' + r + ', ' + g + ', ' + b + ', 0)');
        ctx.beginPath();
        ctx.arc(cx, cy, radius * 1.5, 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.fill();

        // Main orb
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(' + r + ', ' + g + ', ' + b + ', ' + alpha + ')';
        ctx.fill();

        // Inner highlight
        var inner = ctx.createRadialGradient(cx - radius * 0.2, cy - radius * 0.2, 0, cx, cy, radius);
        inner.addColorStop(0, 'rgba(255, 255, 255, ' + (alpha * 0.15) + ')');
        inner.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.fillStyle = inner;
        ctx.fill();
      }

      draw();
    }

    // ── Mic Button Handler ─────────────────────────────────────────────────────

    function onMicClick() {
      switch (currentState) {
        case STATE.DISCONNECTED:
          connectVoice();
          break;
        case STATE.CONNECTING:
          // Already connecting, do nothing
          break;
        case STATE.READY:
          startCapture();
          break;
        case STATE.LISTENING:
          stopCapture();
          break;
        case STATE.THINKING:
          // Do nothing while AI is thinking
          break;
        case STATE.SPEAKING:
          // Barge-in: stop playback and start capturing
          handleInterruption();
          startCapture();
          break;
      }
    }

    // Start idle visualizer on load
    startVisualizer();
  </script>
</body>
