<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Voice - GooseClaw</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #1a1a1a;
      flex-shrink: 0;
    }

    #header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    #disconnect-btn {
      background: none;
      border: 1px solid #333;
      color: #999;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    #disconnect-btn:hover {
      border-color: #ef4444;
      color: #ef4444;
    }

    /* Error banner */
    #error-banner {
      display: none;
      background: #7f1d1d;
      color: #fecaca;
      padding: 10px 16px;
      font-size: 13px;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      animation: slideDown 0.2s ease;
    }

    #error-banner.visible {
      display: flex;
    }

    #error-banner .error-text {
      flex: 1;
      margin-right: 12px;
    }

    #error-banner .error-close {
      background: none;
      border: none;
      color: #fecaca;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Visualizer container */
    #visualizer-container {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 0;
      min-height: 160px;
      flex-shrink: 0;
    }

    #visualizer-canvas {
      width: 160px;
      height: 160px;
    }

    /* Transcript area */
    #transcript {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    /* Controls */
    #controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 16px 24px;
      flex-shrink: 0;
    }

    #status-text {
      font-size: 13px;
      color: #666;
      margin-bottom: 12px;
      text-align: center;
      transition: color 0.3s;
    }

    #mic-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: none;
      background: #333;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      position: relative;
    }

    #mic-btn svg {
      width: 32px;
      height: 32px;
      fill: #e0e0e0;
    }

    /* Mic button states */
    #mic-btn[data-state="disconnected"] {
      background: #333;
    }

    #mic-btn[data-state="connecting"] {
      background: #555;
      animation: pulse 1.5s infinite;
    }

    #mic-btn[data-state="ready"] {
      background: #7c6aef;
    }

    #mic-btn[data-state="listening"] {
      background: #ef4444;
      animation: pulse 1s infinite;
    }

    #mic-btn[data-state="thinking"] {
      background: #f59e0b;
      animation: pulse 1.2s infinite;
    }

    #mic-btn[data-state="speaking"] {
      background: #22c55e;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    /* Status text colors */
    body[data-state="disconnected"] #status-text { color: #666; }
    body[data-state="connecting"] #status-text { color: #999; }
    body[data-state="ready"] #status-text { color: #7c6aef; }
    body[data-state="listening"] #status-text { color: #ef4444; }
    body[data-state="thinking"] #status-text { color: #f59e0b; }
    body[data-state="speaking"] #status-text { color: #22c55e; }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      #mic-btn {
        width: 100px;
        height: 100px;
      }

      #mic-btn svg {
        width: 40px;
        height: 40px;
      }

      #visualizer-container {
        min-height: 120px;
        padding: 16px 0;
      }

      #visualizer-canvas {
        width: 120px;
        height: 120px;
      }
    }
  </style>
</head>
<body data-state="disconnected">

  <!-- Error banner -->
  <div id="error-banner">
    <span class="error-text"></span>
    <button class="error-close" onclick="clearError()">&times;</button>
  </div>

  <!-- Header -->
  <div id="header">
    <h1>GooseClaw Voice</h1>
    <button id="disconnect-btn" onclick="disconnectVoice()">Disconnect</button>
  </div>

  <!-- Visualizer -->
  <div id="visualizer-container">
    <canvas id="visualizer-canvas"></canvas>
  </div>

  <!-- Transcript -->
  <div id="transcript"></div>

  <!-- Controls -->
  <div id="controls">
    <div id="status-text">Tap to connect</div>
    <button id="mic-btn" data-state="disconnected" onclick="onMicClick()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
      </svg>
    </button>
  </div>

  <script>
    'use strict';

    // ── State Machine ──────────────────────────────────────────────────────────

    const STATE = {
      DISCONNECTED: 'disconnected',
      CONNECTING: 'connecting',
      READY: 'ready',
      LISTENING: 'listening',
      THINKING: 'thinking',
      SPEAKING: 'speaking',
    };

    const STATUS_TEXT = {
      disconnected: 'Tap to connect',
      connecting: 'Connecting...',
      ready: 'Tap to speak',
      listening: 'Listening...',
      thinking: 'Thinking...',
      speaking: 'AI is speaking',
    };

    let currentState = STATE.DISCONNECTED;

    function setState(newState) {
      const prev = currentState;
      currentState = newState;
      console.log('[voice] state:', prev, '->', newState);

      // Update mic button
      const micBtn = document.getElementById('mic-btn');
      micBtn.setAttribute('data-state', newState);

      // Update body data-state for status text color
      document.body.setAttribute('data-state', newState);

      // Update status text
      document.getElementById('status-text').textContent = STATUS_TEXT[newState] || '';
    }

    // ── WebSocket Manager ──────────────────────────────────────────────────────

    let ws = null;

    async function connectVoice() {
      if (currentState !== STATE.DISCONNECTED) return;
      setState(STATE.CONNECTING);

      // Clear transcript for new session
      document.getElementById('transcript').innerHTML = '';

      // Fetch session token
      let token;
      try {
        const resp = await fetch('/api/voice/token');
        if (!resp.ok) {
          throw new Error('Failed to get voice token: ' + resp.status);
        }
        const data = await resp.json();
        token = data.token;
      } catch (err) {
        showError('Could not connect to voice service. ' + err.message);
        setState(STATE.DISCONNECTED);
        return;
      }

      // Open WebSocket
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      try {
        ws = new WebSocket(proto + '//' + location.host + '/ws/voice?token=' + token);
        ws.binaryType = 'arraybuffer';
      } catch (err) {
        showError('WebSocket connection failed.');
        setState(STATE.DISCONNECTED);
        return;
      }

      ws.onopen = function() {
        console.log('[voice] WebSocket connected, waiting for ready...');
      };

      ws.onmessage = function(event) {
        if (typeof event.data === 'string') {
          try {
            var msg = JSON.parse(event.data);
            handleProtocolMessage(msg);
          } catch (e) {
            console.warn('[voice] invalid JSON message:', e);
          }
        } else {
          handleAudioData(new Uint8Array(event.data));
        }
      };

      ws.onclose = function(event) {
        console.log('[voice] WebSocket closed, code:', event.code);
        setState(STATE.DISCONNECTED);
        if (event.code !== 1000) {
          showError('Connection lost. Tap mic to reconnect.');
        }
        ws = null;
      };

      ws.onerror = function() {
        showError('Connection error. Check your network.');
      };
    }

    function disconnectVoice() {
      if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
        ws.close(1000);
      }
      ws = null;
      // Audio cleanup (Plan 02 expands this)
      setState(STATE.DISCONNECTED);
    }

    function handleProtocolMessage(msg) {
      switch (msg.type) {
        case 'ready':
          setState(STATE.READY);
          break;
        case 'transcript':
          addTranscript(msg.speaker, msg.text);
          break;
        case 'interrupted':
          handleInterruption();
          break;
        default:
          console.log('[voice] unknown message type:', msg.type);
      }
    }

    // ── Stub Functions (implemented in Plans 02 and 03) ────────────────────────
    // Plan 02 adds: getUserMedia for mic capture, AudioWorklet for PCM encoding

    function handleAudioData(data) {
      // Plan 02: route binary PCM to AudioPlayback
    }

    function addTranscript(speaker, text) {
      // Plan 03: render transcript chat bubbles
    }

    function handleInterruption() {
      // Plan 02: clear playback queue, transition state
    }

    // ── Error Handler ──────────────────────────────────────────────────────────

    let errorTimer = null;

    function showError(message, duration) {
      duration = duration || 8000;
      var banner = document.getElementById('error-banner');
      banner.querySelector('.error-text').textContent = message;
      banner.classList.add('visible');

      if (errorTimer) clearTimeout(errorTimer);
      errorTimer = setTimeout(function() {
        clearError();
      }, duration);
    }

    function clearError() {
      var banner = document.getElementById('error-banner');
      banner.classList.remove('visible');
      if (errorTimer) {
        clearTimeout(errorTimer);
        errorTimer = null;
      }
    }

    // ── Mic Button Handler ─────────────────────────────────────────────────────

    function onMicClick() {
      switch (currentState) {
        case STATE.DISCONNECTED:
          connectVoice();
          break;
        case STATE.CONNECTING:
          // Already connecting, do nothing
          break;
        case STATE.READY:
          // Plan 02: startCapture()
          console.log('[voice] Audio capture not yet implemented');
          break;
        case STATE.LISTENING:
          // Plan 02: stopCapture()
          console.log('[voice] Stop capture not yet implemented');
          break;
        case STATE.THINKING:
          // Do nothing while AI is thinking
          break;
        case STATE.SPEAKING:
          // Plan 02: barge-in
          console.log('[voice] Barge-in not yet implemented');
          break;
      }
    }
  </script>
</body>
</html>
