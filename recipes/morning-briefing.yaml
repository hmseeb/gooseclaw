version: 1.0.0
title: Morning Briefing
description: Daily morning briefing. Summarize pending tasks, check for failures, deliver concisely.
prompt: |
  You are running as a scheduled morning briefing. Be concise and actionable.

  1. Read /data/identity/memory.md for context on recent activity
  2. Check /data/identity/journal/ for recent entries
  3. List any pending tasks or open items
  4. Provide a brief summary of what's on the agenda

  Keep it short. Bullet points, no fluff. This is a briefing, not an essay.

  After completing the briefing, write a journal entry to /data/identity/journal/
  with today's date (YYYY-MM-DD.md format).
